spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/board_db?useUnicode=true&characterEncoding=utf8
    username: root
    password: 1234        # MariaDB 설치 시 설정한 root 비밀번호로 변경
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 앱 실행 시 테이블 자동 생성/수정
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.board.dto
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

jwt:
  # Base64 인코딩된 256비트 이상 시크릿 키 (운영 환경에서는 환경변수로 교체 필요)
  secret: Y29kZUxvZy1ib2FyZC1wcm9qZWN0LXNlY3JldC1rZXktZm9yLWp3dC1hdXRoZW50aWNhdGlvbg==
  access-token-expiration: 1800000    # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
