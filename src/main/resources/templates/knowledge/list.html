<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>지식나눔 - CodeLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('knowledge')}"></div>

<div class="container mt-4 mb-5">

    <!-- 성공 메시지 -->
    <div th:if="${successMsg}" class="alert alert-success alert-auto-close" th:text="${successMsg}"></div>

    <!-- 헤더 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="mb-0 fw-bold">🌿 지식나눔</h5>
            <small class="text-muted">글을 브랜치해서 지식을 함께 발전시켜 보세요</small>
        </div>
        <a th:href="@{/knowledge/write}" sec:authorize="isAuthenticated()"
           class="btn btn-dark btn-sm">✏️ 글쓰기</a>
    </div>

    <!-- 글 목록 -->
    <div th:if="${#lists.isEmpty(posts)}" class="empty-state" style="padding: 4rem 1rem;">
        <div class="empty-state-icon">🌱</div>
        <div class="empty-state-text">
            <span th:if="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}">
                "<span th:text="${searchDto.keyword}"></span>" 검색 결과가 없습니다.
            </span>
            <span th:unless="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}">
                아직 글이 없습니다. 첫 번째 지식을 나눠보세요!
            </span>
        </div>
    </div>

    <div class="d-flex flex-column gap-3 mb-3" th:unless="${#lists.isEmpty(posts)}">
        <a th:each="post : ${posts}"
           th:href="@{/knowledge/{id}(id=${post.id})}"
           class="text-decoration-none">
            <div class="card knowledge-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h6 class="knowledge-card-title mb-1" th:text="${post.title}"></h6>
                        <!-- 브랜치 수 뱃지 -->
                        <span th:if="${post.branchCount > 0}"
                              class="badge"
                              style="background:var(--accent); font-size:0.75rem; white-space:nowrap; margin-left:8px;">
                            🌿 <span th:text="${post.branchCount}"></span>개 브랜치
                        </span>
                    </div>
                    <!-- 내용 미리보기 -->
                    <p class="knowledge-card-excerpt text-muted mb-2"
                       th:text="${#strings.abbreviate(post.content, 120)}"></p>
                    <!-- 작성자 + 날짜 + 조회수 -->
                    <div class="d-flex align-items-center gap-2" style="font-size:0.82rem; color:var(--text-light);">
                        <div class="author-avatar-sm"
                             th:text="${!#strings.isEmpty(post.nickname) ? #strings.substring(post.nickname,0,1).toUpperCase() : '?'}">A</div>
                        <span th:text="${post.nickname}"></span>
                        <span>·</span>
                        <span class="rel-time"
                              th:attr="data-time=${#temporals.format(post.createdAt,'yyyy-MM-dd''T''HH:mm:ss')}"
                              th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd')}"></span>
                        <span>·</span>
                        <span>👁 <span th:text="${post.viewCount}"></span></span>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- 총 글 수 -->
    <div class="text-muted mb-3" style="font-size:0.82rem;" th:unless="${#lists.isEmpty(posts)}">
        총 <strong th:text="${totalCount}">0</strong>개의 글
    </div>

    <!-- 검색 -->
    <div class="search-bar mb-4">
        <form th:action="@{/knowledge}" method="get" class="d-flex gap-2 align-items-center">
            <input type="text" name="keyword" class="form-control"
                   placeholder="제목 또는 내용으로 검색"
                   th:value="${searchDto.keyword}">
            <button type="submit" class="btn btn-dark flex-shrink-0">검색</button>
            <a th:if="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}"
               th:href="@{/knowledge}"
               class="btn btn-outline-secondary flex-shrink-0">초기화</a>
        </form>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/knowledge(page=${currentPage - 1}, keyword=${searchDto.keyword})}">‹</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/knowledge(page=${i}, keyword=${searchDto.keyword})}"
                   th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/knowledge(page=${currentPage + 1}, keyword=${searchDto.keyword})}">›</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function relativeTime(dateStr) {
    const now = new Date();
    const past = new Date(dateStr);
    const diff = Math.floor((now - past) / 1000);
    if (diff < 60)        return '방금 전';
    if (diff < 3600)      return Math.floor(diff / 60) + '분 전';
    if (diff < 86400)     return Math.floor(diff / 3600) + '시간 전';
    if (diff < 86400 * 7) return Math.floor(diff / 86400) + '일 전';
    return dateStr.substring(0, 10);
}
document.querySelectorAll('.rel-time').forEach(el => {
    const t = el.getAttribute('data-time');
    if (t) el.textContent = relativeTime(t);
});
document.querySelectorAll('.alert-auto-close').forEach(el => setTimeout(() => el.remove(), 4000));
</script>
</body>
</html>
