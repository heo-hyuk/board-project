<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기 - 지식나눔</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('knowledge')}"></div>

<div class="container mt-4 mb-5">
    <div class="write-container">

        <div class="d-flex align-items-center gap-2 mb-3">
            <a th:href="@{/knowledge}" class="btn btn-outline-secondary btn-sm">← 목록</a>
            <h5 class="mb-0 fw-bold">🌿 지식나눔 새 글 작성</h5>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                <form th:action="@{/knowledge/write}" method="post" id="writeForm">

                    <!-- 제목 -->
                    <div class="mb-3">
                        <label class="form-label" for="title">제목 <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="title" name="title"
                               class="form-control" placeholder="공유하고 싶은 지식의 제목을 입력하세요"
                               required maxlength="200" oninput="updateCounter(this)">
                        <div class="char-counter" id="titleCounter">0 / 200</div>
                    </div>

                    <!-- 내용 (마크다운 에디터) -->
                    <div class="mb-4">
                        <label class="form-label">내용 <span style="color:var(--danger)">*</span></label>
                        <textarea id="content" name="content"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">발행하기</button>
                        <a th:href="@{/knowledge}" class="btn btn-outline-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
const easyMDE = new EasyMDE({
    element: document.getElementById('content'),
    placeholder: '마크다운으로 지식을 공유해보세요...',
    spellChecker: false,
    minHeight: '400px',
    toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|',
              'link', 'code', '|', 'preview', 'side-by-side', 'fullscreen', '|', 'guide'],
    status: ['lines', 'words'],
    previewRender: (text) => marked.parse(text)
});

/* 폼 제출 전 에디터 내용 동기화 */
document.getElementById('writeForm').addEventListener('submit', function () {
    document.getElementById('content').value = easyMDE.value();
});

function updateCounter(el) {
    const c = document.getElementById('titleCounter');
    const len = el.value.length;
    c.textContent = len + ' / 200';
    c.className = 'char-counter' + (len >= 190 ? ' danger' : len >= 170 ? ' warning' : '');
}
</script>
</body>
</html>
