<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title} + ' - CodeLog'">포스트</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('board')}"></div>

<div class="container mt-4 mb-5" style="max-width: 820px;">

    <!-- 성공 메시지 -->
    <div th:if="${successMsg}" class="alert alert-success alert-auto-close" th:text="${successMsg}"></div>

    <!-- 아티클 헤더 -->
    <div class="article-header">
        <div class="article-category">
            <span class="category-badge"
                  th:classappend="'cat-' + ${post.category}"
                  th:text="${post.category}"></span>
        </div>
        <h1 class="article-title" th:text="${post.title}"></h1>

        <!-- 태그 목록 -->
        <div th:if="${not #lists.isEmpty(post.tags)}" class="tag-list mb-3">
            <a th:each="tag : ${post.tags}"
               th:href="@{/board(tag=${tag.name})}"
               th:text="'#' + ${tag.name}"
               class="tag-pill"></a>
        </div>

        <div class="article-meta">
            <div class="article-author-box">
                <div class="author-avatar"
                     th:text="${(post.user != null and !#strings.isEmpty(post.user.nickname)) ? #strings.substring(post.user.nickname, 0, 1).toUpperCase() : '?'}">A</div>
                <div>
                    <div class="article-author-name" th:text="${post.user != null ? post.user.nickname : '알 수 없음'}"></div>
                    <div class="article-date">
                        <span class="rel-time"
                              th:attr="data-time=${#temporals.format(post.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                              th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
                        <span th:if="${post.updatedAt != null and post.updatedAt != post.createdAt}"
                              style="margin-left: 4px; opacity: 0.7;">(수정됨)</span>
                    </div>
                </div>
            </div>
            <div class="article-view-badge ms-auto">
                👁 <span th:text="${post.viewCount}"></span>
            </div>
        </div>
    </div>

    <!-- 마크다운 본문 -->
    <div class="card mb-4">
        <div class="card-body" style="padding: 2rem;">
            <!-- 마크다운 렌더링 영역 -->
            <div id="markdownContent" class="markdown-body"></div>
            <!-- 원본 마크다운 (JS가 읽어서 렌더링) -->
            <div id="rawContent" th:text="${post.content}" style="display:none;"></div>
        </div>

        <!-- 좋아요 + 수정/삭제 -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <!-- 좋아요 버튼 -->
            <button id="likeBtn"
                    class="like-btn"
                    th:classappend="${liked} ? 'liked'"
                    th:attr="data-post-id=${post.id}"
                    sec:authorize="isAuthenticated()"
                    onclick="toggleLike(this)">
                <span class="heart" th:text="${liked} ? '❤️' : '🤍'"></span>
                <span id="likeCount" th:text="${likeCount}"></span>
                <span style="font-size:0.82rem; margin-left:2px;">좋아요</span>
            </button>
            <span sec:authorize="isAnonymous()" class="like-btn" style="cursor:default; pointer-events:none;">
                🤍 <span th:text="${likeCount}"></span> <span style="font-size:0.82rem;">좋아요</span>
            </span>

            <!-- 수정/삭제 버튼 (작성자만) -->
            <div class="d-flex gap-2" th:if="${isAuthor}">
                <a th:href="@{/board/{id}/edit(id=${post.id})}"
                   class="btn btn-sm btn-outline-secondary">수정</a>
                <form th:action="@{/board/{id}/delete(id=${post.id})}" method="post"
                      onsubmit="return confirm('포스트를 삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 목록으로 -->
    <a th:href="@{/board}" class="btn btn-outline-secondary btn-sm mb-4">← 목록으로</a>

    <!-- 댓글 섹션 -->
    <div class="mb-2 d-flex align-items-center gap-2">
        <span class="comment-section-title">댓글</span>
        <span class="comment-count-pill" th:text="${#lists.size(comments)}"></span>
    </div>

    <!-- 댓글 목록 -->
    <div class="d-flex flex-column gap-2 mb-3">
        <div th:if="${#lists.isEmpty(comments)}" class="empty-state" style="padding: 2rem 1rem;">
            <div class="empty-state-icon">💬</div>
            <div class="empty-state-text">첫 댓글을 남겨보세요!</div>
        </div>
        <div th:each="comment : ${comments}" class="comment-item">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span class="comment-author" th:text="${comment.nickname}"></span>
                    <span class="comment-time ms-2"
                          th:attr="data-time=${#temporals.format(comment.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <form th:action="@{/comment/{id}/delete(id=${comment.id})}" method="post"
                      th:if="${loginUsername != null and loginUsername == comment.username}"
                      sec:authorize="isAuthenticated()"
                      onsubmit="return confirm('댓글을 삭제하시겠습니까?')">
                    <input type="hidden" name="postId" th:value="${post.id}">
                    <button type="submit" class="comment-delete-btn">삭제</button>
                </form>
            </div>
            <p class="comment-text" th:text="${comment.content}"></p>
        </div>
    </div>

    <!-- 댓글 작성 (로그인 시) -->
    <div class="comment-input-area" sec:authorize="isAuthenticated()">
        <form th:action="@{/comment/write}" method="post" class="d-flex gap-2">
            <input type="hidden" name="postId" th:value="${post.id}">
            <input type="text" name="content" class="form-control"
                   placeholder="댓글을 입력하세요" required maxlength="500">
            <button type="submit" class="btn btn-dark flex-shrink-0">등록</button>
        </form>
    </div>

    <!-- 비로그인 시 댓글 안내 -->
    <div class="comment-input-area text-center" sec:authorize="isAnonymous()">
        <span class="text-muted" style="font-size:0.875rem;">
            <a th:href="@{/auth/login}" style="color:var(--accent); font-weight:600;">로그인</a> 후 댓글을 작성할 수 있습니다.
        </span>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
<script>
/* 마크다운 렌더링 */
const rawContent = document.getElementById('rawContent').textContent;
const markdownDiv = document.getElementById('markdownContent');

marked.setOptions({
    breaks: true,     // 줄바꿈을 <br>로 처리
    gfm: true         // GitHub Flavored Markdown
});

/* DOMPurify로 XSS 방지 후 렌더링 */
markdownDiv.innerHTML = DOMPurify.sanitize(marked.parse(rawContent));

/* 코드 블록 syntax highlighting */
markdownDiv.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
});

/* 상대 시간 변환 */
function relativeTime(dateStr) {
    const now = new Date();
    const past = new Date(dateStr);
    const diff = Math.floor((now - past) / 1000);
    if (diff < 60)         return '방금 전';
    if (diff < 3600)       return Math.floor(diff / 60) + '분 전';
    if (diff < 86400)      return Math.floor(diff / 3600) + '시간 전';
    if (diff < 86400 * 7)  return Math.floor(diff / 86400) + '일 전';
    return dateStr.substring(0, 10);
}
document.querySelectorAll('.rel-time').forEach(el => {
    const t = el.getAttribute('data-time');
    if (t) el.textContent = relativeTime(t);
});

/* 알림 자동 닫기 */
document.querySelectorAll('.alert-auto-close').forEach(el => {
    setTimeout(() => el.remove(), 4000);
});

/* 좋아요 AJAX 토글 */
async function toggleLike(btn) {
    const postId = btn.getAttribute('data-post-id');
    const csrf   = document.querySelector('meta[name="_csrf"]')?.content;
    const header = document.querySelector('meta[name="_csrf_header"]')?.content;
    try {
        const res = await fetch('/like/' + postId, {
            method: 'POST',
            headers: { [header]: csrf }
        });
        const data = await res.json();
        btn.querySelector('.heart').textContent = data.liked ? '❤️' : '🤍';
        document.getElementById('likeCount').textContent = data.likeCount;
        btn.classList.toggle('liked', data.liked);
    } catch(e) {
        console.error('좋아요 처리 실패', e);
    }
}
</script>
</body>
</html>
