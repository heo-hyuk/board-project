<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar('board')}"></div>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/board}" class="btn btn-outline-secondary btn-sm">← 목록</a>
                <h5 class="mb-0 fw-bold">게시글 작성</h5>
            </div>

            <div class="card">
                <div class="card-body p-4">

                    <!-- 입력 오류 메시지 -->
                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/board/write}" method="post">
                        <!-- 제목 -->
                        <div class="mb-3">
                            <label class="form-label" for="title">제목</label>
                            <input type="text" id="title" name="title"
                                   class="form-control" placeholder="제목을 입력하세요"
                                   required maxlength="200" oninput="updateTitleCounter(this)">
                            <div class="char-counter" id="titleCounter">0 / 200</div>
                        </div>

                        <!-- 내용 -->
                        <div class="mb-4">
                            <label class="form-label" for="content">내용</label>
                            <textarea id="content" name="content"
                                      class="form-control" rows="14"
                                      placeholder="내용을 입력하세요"
                                      required oninput="updateContentCounter(this)"></textarea>
                            <div class="char-counter" id="contentCounter">0 자</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">작성하기</button>
                            <a th:href="@{/board}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function updateTitleCounter(el) {
    const counter = document.getElementById('titleCounter');
    const len = el.value.length;
    counter.textContent = len + ' / 200';
    counter.className = 'char-counter' + (len >= 190 ? ' danger' : len >= 170 ? ' warning' : '');
}

function updateContentCounter(el) {
    const counter = document.getElementById('contentCounter');
    const len = el.value.length;
    counter.textContent = len.toLocaleString() + ' 자';
    counter.className = 'char-counter';
}
</script>
</body>
</html>
