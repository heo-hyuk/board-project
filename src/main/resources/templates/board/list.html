<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>포스트 - CodeLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('board')}"></div>

<div class="container mt-4 mb-5">

    <!-- 성공 메시지 -->
    <div th:if="${successMsg}" class="alert alert-success alert-auto-close" th:text="${successMsg}"></div>

    <!-- 헤더 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold">전체 포스트</h5>
        <a th:href="@{/board/write}" sec:authorize="isAuthenticated()"
           class="btn btn-dark btn-sm">✏️ 글쓰기</a>
    </div>

    <!-- 카테고리 탭 -->
    <div class="category-tabs">
        <a class="category-tab"
           th:href="@{/board(category='', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == null or searchDto.category == ''} ? 'active'">전체</a>
        <a class="category-tab"
           th:href="@{/board(category='Java', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == 'Java'} ? 'active'">Java</a>
        <a class="category-tab"
           th:href="@{/board(category='Spring', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == 'Spring'} ? 'active'">Spring</a>
        <a class="category-tab"
           th:href="@{/board(category='Web', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == 'Web'} ? 'active'">Web</a>
        <a class="category-tab"
           th:href="@{/board(category='DevOps', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == 'DevOps'} ? 'active'">DevOps</a>
        <a class="category-tab"
           th:href="@{/board(category='알고리즘', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == '알고리즘'} ? 'active'">알고리즘</a>
        <a class="category-tab"
           th:href="@{/board(category='CS지식', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == 'CS지식'} ? 'active'">CS지식</a>
        <a class="category-tab"
           th:href="@{/board(category='회고', keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
           th:classappend="${searchDto.category == '회고'} ? 'active'">회고</a>
    </div>

    <!-- 포스트 카드 그리드 -->
    <div th:if="${#lists.isEmpty(posts)}" class="empty-state" style="padding: 4rem 1rem;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">
            <span th:if="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}">
                "<span th:text="${searchDto.keyword}"></span>" 검색 결과가 없습니다.
            </span>
            <span th:unless="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}">
                아직 포스트가 없습니다. 첫 번째 포스트를 작성해보세요!
            </span>
        </div>
    </div>

    <div class="row g-3 mb-3" th:unless="${#lists.isEmpty(posts)}">
        <div class="col-md-6 col-lg-4" th:each="post : ${posts}">
            <a th:href="@{/board/{id}(id=${post.id})}" class="post-card text-decoration-none d-block h-100">
                <!-- 카테고리 뱃지 -->
                <div class="post-card-category">
                    <span class="category-badge"
                          th:classappend="'cat-' + ${post.category}"
                          th:text="${post.category}"></span>
                </div>
                <!-- 제목 -->
                <div class="post-card-title" th:text="${post.title}"></div>
                <!-- 요약 -->
                <div class="post-card-excerpt"
                     th:text="${post.summary != null and !post.summary.isEmpty() ? post.summary : #strings.abbreviate(post.content, 130)}">
                </div>
                <!-- 푸터 -->
                <div class="post-card-footer">
                    <div class="post-card-author">
                        <div class="author-avatar-sm"
                             th:text="${!#strings.isEmpty(post.nickname) ? #strings.substring(post.nickname, 0, 1).toUpperCase() : '?'}">A</div>
                        <span th:text="${!#strings.isEmpty(post.nickname) ? post.nickname : '알 수 없음'}"></span>
                        <span class="text-muted">·</span>
                        <span class="rel-time"
                              th:attr="data-time=${#temporals.format(post.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                              th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}"></span>
                    </div>
                    <div class="post-card-stats">
                        <span class="post-card-stat">👁 <span th:text="${post.viewCount}"></span></span>
                        <span class="post-card-stat" th:if="${post.likeCount > 0}">❤️ <span th:text="${post.likeCount}"></span></span>
                        <span class="post-card-stat" th:if="${post.commentCount > 0}">💬 <span th:text="${post.commentCount}"></span></span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 총 포스트 수 -->
    <div class="text-muted mb-3" style="font-size:0.82rem;" th:unless="${#lists.isEmpty(posts)}">
        총 <strong th:text="${totalCount}">0</strong>개의 포스트
    </div>

    <!-- 검색 바 -->
    <div class="search-bar mb-4">
        <form th:action="@{/board}" method="get" class="d-flex gap-2 align-items-center">
            <input type="hidden" name="category" th:value="${searchDto.category}">
            <select name="searchType" class="form-select" style="max-width:140px;">
                <option value="all"     th:selected="${searchDto.searchType == 'all'     or searchDto.searchType == null}">제목+내용</option>
                <option value="title"   th:selected="${searchDto.searchType == 'title'}">제목</option>
                <option value="content" th:selected="${searchDto.searchType == 'content'}">내용</option>
            </select>
            <input type="text" name="keyword" class="form-control"
                   placeholder="검색어를 입력하세요"
                   th:value="${searchDto.keyword}">
            <button type="submit" class="btn btn-dark flex-shrink-0">검색</button>
            <a th:if="${searchDto.keyword != null and !searchDto.keyword.isEmpty()}"
               th:href="@{/board(category=${searchDto.category})}"
               class="btn btn-outline-secondary flex-shrink-0">초기화</a>
        </form>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/board(page=${currentPage - 1}, category=${searchDto.category}, keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}">‹</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/board(page=${i}, category=${searchDto.category}, keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}"
                   th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/board(page=${currentPage + 1}, category=${searchDto.category}, keyword=${searchDto.keyword}, searchType=${searchDto.searchType})}">›</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function relativeTime(dateStr) {
    const now = new Date();
    const past = new Date(dateStr);
    const diff = Math.floor((now - past) / 1000);
    if (diff < 60)         return '방금 전';
    if (diff < 3600)       return Math.floor(diff / 60) + '분 전';
    if (diff < 86400)      return Math.floor(diff / 3600) + '시간 전';
    if (diff < 86400 * 7)  return Math.floor(diff / 86400) + '일 전';
    return dateStr.substring(0, 10);
}
document.querySelectorAll('.rel-time').forEach(el => {
    const t = el.getAttribute('data-time');
    if (t) el.textContent = relativeTime(t);
});
document.querySelectorAll('.alert-auto-close').forEach(el => {
    setTimeout(() => el.remove(), 4000);
});
</script>
</body>
</html>
