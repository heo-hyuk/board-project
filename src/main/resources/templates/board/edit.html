<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>포스트 수정 - CodeLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('board')}"></div>

<div class="container mt-4 mb-5">
    <div class="write-container">

        <div class="d-flex align-items-center gap-2 mb-3">
            <a th:href="@{/board/{id}(id=${post.id})}" class="btn btn-outline-secondary btn-sm">← 뒤로</a>
            <h5 class="mb-0 fw-bold">포스트 수정</h5>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                <form th:action="@{/board/{id}/edit(id=${post.id})}" method="post">

                    <!-- 카테고리 + 태그 -->
                    <div class="row g-3 mb-3">
                        <div class="col-sm-5">
                            <label class="form-label">카테고리</label>
                            <select name="category" class="form-select">
                                <option value="Java"   th:selected="${post.category == 'Java'}">Java</option>
                                <option value="Spring" th:selected="${post.category == 'Spring'}">Spring</option>
                                <option value="Web"    th:selected="${post.category == 'Web'}">Web</option>
                                <option value="DevOps" th:selected="${post.category == 'DevOps'}">DevOps</option>
                                <option value="알고리즘" th:selected="${post.category == '알고리즘'}">알고리즘</option>
                                <option value="CS지식"  th:selected="${post.category == 'CS지식'}">CS지식</option>
                                <option value="회고"    th:selected="${post.category == '회고'}">회고</option>
                            </select>
                        </div>
                        <div class="col-sm-7">
                            <label class="form-label" for="tags">태그</label>
                            <input type="text" id="tags" name="tags"
                                   class="form-control"
                                   th:value="${#strings.listJoin(post.tags.![name], ', ')}"
                                   placeholder="Java, Spring, JPA (쉼표로 구분, 최대 5개)">
                            <div class="tag-input-hint">각 태그는 20자 이하, # 없이 입력</div>
                        </div>
                    </div>

                    <!-- 제목 -->
                    <div class="mb-3">
                        <label class="form-label" for="title">제목</label>
                        <input type="text" id="title" name="title"
                               class="form-control"
                               th:value="${post.title}"
                               required maxlength="200"
                               oninput="updateTitleCounter(this)">
                        <div class="char-counter" id="titleCounter"></div>
                    </div>

                    <!-- 요약 -->
                    <div class="mb-3">
                        <label class="form-label" for="summary">요약 <span style="color:var(--text-light); font-weight:400;">(선택)</span></label>
                        <input type="text" id="summary" name="summary"
                               class="form-control"
                               th:value="${post.summary}"
                               placeholder="포스트를 한 줄로 소개해보세요"
                               maxlength="200">
                    </div>

                    <!-- 마크다운 에디터 -->
                    <div class="mb-4">
                        <label class="form-label">내용</label>
                        <textarea id="content" name="content"
                                  required
                                  th:text="${post.content}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">수정 완료</button>
                        <a th:href="@{/board/{id}(id=${post.id})}" class="btn btn-outline-secondary">취소</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
/* 마크다운 에디터 초기화 */
const easyMDE = new EasyMDE({
    element: document.getElementById('content'),
    spellChecker: false,
    minHeight: '400px',
    toolbar: [
        'bold', 'italic', 'heading', '|',
        'quote', 'unordered-list', 'ordered-list', '|',
        'link', 'code', '|',
        'preview', 'side-by-side', 'fullscreen', '|',
        'guide'
    ],
    status: ['lines', 'words', 'cursor'],
    previewRender(plainText) {
        return marked.parse(plainText);
    }
});

/* 제목 글자 수 카운터 */
function updateTitleCounter(el) {
    const counter = document.getElementById('titleCounter');
    const len = el.value.length;
    counter.textContent = len + ' / 200';
    counter.className = 'char-counter' + (len >= 190 ? ' danger' : len >= 170 ? ' warning' : '');
}

window.addEventListener('DOMContentLoaded', () => {
    const title = document.getElementById('title');
    if (title) updateTitleCounter(title);
});
</script>
</body>
</html>
