<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정 - CodeLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('board')}"></div>

<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex align-items-center gap-2 mb-3">
                <a th:href="@{/board/{id}(id=${post.id})}" class="btn btn-outline-secondary btn-sm">← 뒤로</a>
                <h5 class="mb-0 fw-bold">게시글 수정</h5>
            </div>

            <div class="card">
                <div class="card-body p-4">

                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/board/{id}/edit(id=${post.id})}" method="post">

                        <!-- 카테고리 선택 -->
                        <div class="mb-3">
                            <label class="form-label">카테고리</label>
                            <select name="category" class="form-select">
                                <option value="자유"      th:selected="${post.category == '자유'}">💬 자유</option>
                                <option value="질문"      th:selected="${post.category == '질문'}">❓ 질문</option>
                                <option value="프로젝트"  th:selected="${post.category == '프로젝트'}">💡 프로젝트</option>
                                <option value="취업/커리어" th:selected="${post.category == '취업/커리어'}">🔥 취업/커리어</option>
                                <option value="공지"      th:selected="${post.category == '공지'}">📢 공지</option>
                            </select>
                        </div>

                        <!-- 제목 -->
                        <div class="mb-3">
                            <label class="form-label" for="title">제목</label>
                            <input type="text" id="title" name="title"
                                   class="form-control"
                                   th:value="${post.title}"
                                   required maxlength="200"
                                   oninput="updateTitleCounter(this)">
                            <div class="char-counter" id="titleCounter"></div>
                        </div>

                        <!-- 태그 -->
                        <div class="mb-3">
                            <label class="form-label" for="tags">태그</label>
                            <input type="text" id="tags" name="tags"
                                   class="form-control"
                                   th:value="${#strings.listJoin(post.tags.![name], ', ')}"
                                   placeholder="Java, Spring, MySQL (쉼표로 구분, 최대 5개)">
                            <div class="tag-input-hint">각 태그는 20자 이하, # 없이 입력하세요</div>
                        </div>

                        <!-- 내용 -->
                        <div class="mb-4">
                            <label class="form-label" for="content">내용</label>
                            <textarea id="content" name="content"
                                      class="form-control" rows="14"
                                      required
                                      oninput="updateContentCounter(this)"
                                      th:text="${post.content}"></textarea>
                            <div class="char-counter" id="contentCounter"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">수정하기</button>
                            <a th:href="@{/board/{id}(id=${post.id})}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function updateTitleCounter(el) {
    const counter = document.getElementById('titleCounter');
    const len = el.value.length;
    counter.textContent = len + ' / 200';
    counter.className = 'char-counter' + (len >= 190 ? ' danger' : len >= 170 ? ' warning' : '');
}
function updateContentCounter(el) {
    const counter = document.getElementById('contentCounter');
    counter.textContent = el.value.length.toLocaleString() + ' 자';
}
window.addEventListener('DOMContentLoaded', () => {
    const title = document.getElementById('title');
    const content = document.getElementById('content');
    if (title)   updateTitleCounter(title);
    if (content) updateContentCounter(content);
});
</script>
</body>
</html>
