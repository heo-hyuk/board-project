<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
<div th:replace="~{layout/base :: navbar(null)}"></div>

<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-6 col-lg-4">

                <!-- 로고 영역 -->
                <div class="text-center mb-4">
                    <div class="auth-logo" style="font-size:1rem; font-weight:800; letter-spacing:-1px;">CL</div>
                    <h4 class="fw-bold mb-1">CodeLog</h4>
                    <p class="text-muted" style="font-size:0.875rem;">계속하려면 로그인하세요</p>
                </div>

                <div class="card auth-card">
                    <div class="card-body p-4">

                        <!-- 에러 메시지 -->
                        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                        <!-- 성공 메시지 (회원가입 후 리다이렉트) -->
                        <div th:if="${successMsg}" class="alert alert-success alert-auto-close" th:text="${successMsg}"></div>

                        <form th:action="@{/auth/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label" for="username">아이디</label>
                                <input type="text" id="username" name="username"
                                       class="form-control" placeholder="아이디를 입력하세요" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="password">비밀번호</label>
                                <input type="password" id="password" name="password"
                                       class="form-control" placeholder="비밀번호를 입력하세요" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark">로그인</button>
                            </div>
                        </form>

                    </div>
                </div>

                <p class="text-center mt-3" style="font-size:0.875rem; color:var(--text-muted);">
                    계정이 없으신가요?
                    <a th:href="@{/auth/join}" style="color:var(--accent); font-weight:600;">회원가입</a>
                </p>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelectorAll('.alert-auto-close').forEach(el => {
    setTimeout(() => el.remove(), 4000);
});
</script>
</body>
</html>
