<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:fragment="title">게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar navbar-expand-lg" th:fragment="navbar(currentPage)">
    <div class="container">
        <!-- 브랜드 로고 -->
        <a class="navbar-brand" th:href="@{/board}">
            Code<span>Log</span>
        </a>

        <!-- 모바일 토글 버튼 -->
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                style="filter: invert(1);">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/board}"
                       th:classappend="${currentPage == 'board'} ? 'active'">게시글</a>
                </li>
            </ul>

            <!-- 로그인 상태 -->
            <ul class="navbar-nav align-items-center gap-1" sec:authorize="isAuthenticated()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/mypage}"
                       th:classappend="${currentPage == 'mypage'} ? 'active'">마이페이지</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/auth/logout}" method="post" class="mb-0">
                        <button type="submit" class="nav-btn-logout">로그아웃</button>
                    </form>
                </li>
                <li class="nav-item">
                    <!-- 로그인한 사용자 닉네임 표시 -->
                    <span class="nav-link text-white opacity-50 d-none d-lg-block" style="font-size:0.8rem; pointer-events:none;">
                        <sec:authentication property="principal.username"/>
                    </span>
                </li>
            </ul>

            <!-- 비로그인 상태 -->
            <ul class="navbar-nav align-items-center gap-1" sec:authorize="isAnonymous()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/auth/login}">로그인</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-sm btn-outline-light ms-1" th:href="@{/auth/join}"
                       style="border-radius:6px; padding:0.35rem 0.875rem; font-size:0.875rem;">회원가입</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
