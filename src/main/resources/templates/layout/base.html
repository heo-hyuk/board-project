<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar navbar-expand-lg" th:fragment="navbar(currentPage)">
    <div class="container">
        <!-- 브랜드 로고 -->
        <a class="navbar-brand" th:href="@{/}">
            Code<span>Log</span>
        </a>

        <!-- 모바일 토글 버튼 -->
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="메뉴 열기"
                style="filter: invert(1);">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- 왼쪽 메뉴 -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/board}"
                       th:classappend="${currentPage == 'board'} ? 'active'">포스트</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/knowledge}"
                       th:classappend="${currentPage == 'knowledge'} ? 'active'">지식나눔</a>
                </li>
            </ul>

            <!-- 로그인 상태 -->
            <ul class="navbar-nav navbar-nav-right" sec:authorize="isAuthenticated()">
                <li class="nav-item">
                    <a class="nav-link nav-write-btn" th:href="@{/board/write}">✏️ 글쓰기</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/mypage}"
                       th:classappend="${currentPage == 'mypage'} ? 'active'">마이페이지</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/auth/logout}" method="post" class="mb-0">
                        <button type="submit" class="nav-btn-logout">로그아웃</button>
                    </form>
                </li>
            </ul>

            <!-- 비로그인 상태 -->
            <ul class="navbar-nav navbar-nav-right" sec:authorize="isAnonymous()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/auth/login}">로그인</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-join-btn" th:href="@{/auth/join}">회원가입</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
