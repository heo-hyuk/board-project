<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div th:replace="~{layout/base :: navbar('mypage')}"></div>

<div class="container mt-4 mb-5">

    <!-- 알림 메시지 (자동 닫힘) -->
    <div th:if="${successMsg}" class="alert alert-success alert-auto-close" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"                   th:text="${errorMsg}"></div>

    <div class="row g-4">

        <!-- 왼쪽: 프로필 + 설정 -->
        <div class="col-md-5 col-lg-4">

            <!-- 프로필 카드 -->
            <div class="card mb-3">
                <div class="card-body text-center py-4">
                    <!-- 이니셜 아바타 -->
                    <div class="user-avatar" id="userAvatar"></div>
                    <h6 class="fw-bold mb-0" th:text="${user.nickname}"></h6>
                    <p class="text-muted" style="font-size:0.8rem;" th:text="'@' + ${user.username}"></p>
                </div>
                <div class="card-footer p-0">
                    <div class="info-row px-3">
                        <span class="info-label">이메일</span>
                        <span class="info-value" th:text="${user.email}"></span>
                    </div>
                    <div class="info-row px-3">
                        <span class="info-label">가입일</span>
                        <span class="info-value"
                              th:text="${#temporals.format(user.createdAt, 'yyyy.MM.dd')}"></span>
                    </div>
                    <div class="info-row px-3">
                        <span class="info-label">작성 글</span>
                        <span class="info-value" style="color:var(--accent);"
                              th:text="${#lists.size(myPosts)} + '개'"></span>
                    </div>
                </div>
            </div>

            <!-- 닉네임 변경 -->
            <div class="card mb-3">
                <div class="card-header">닉네임 변경</div>
                <div class="card-body">
                    <form th:action="@{/user/nickname}" method="post">
                        <div class="input-group">
                            <input type="text" name="nickname" class="form-control"
                                   th:placeholder="${user.nickname}"
                                   required maxlength="20">
                            <button type="submit" class="btn btn-dark">변경</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 비밀번호 변경 -->
            <div class="card">
                <div class="card-header">비밀번호 변경</div>
                <div class="card-body">
                    <form th:action="@{/user/password}" method="post">
                        <div class="mb-2">
                            <input type="password" name="currentPassword"
                                   class="form-control" placeholder="현재 비밀번호" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="newPassword"
                                   class="form-control" placeholder="새 비밀번호 (6자 이상)"
                                   required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-dark w-100">비밀번호 변경</button>
                    </form>
                </div>
            </div>

        </div>

        <!-- 오른쪽: 내가 작성한 게시글 -->
        <div class="col-md-7 col-lg-8">
            <div class="card">
                <div class="card-header d-flex align-items-center gap-2">
                    내가 작성한 게시글
                    <span class="comment-count-pill" th:text="${#lists.size(myPosts)}"></span>
                </div>
                <div class="card-body p-0">

                    <!-- 빈 상태 -->
                    <div th:if="${#lists.isEmpty(myPosts)}" class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-text">아직 작성한 게시글이 없습니다.</div>
                    </div>

                    <!-- 게시글 목록 -->
                    <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(myPosts)}">
                        <li class="list-group-item d-flex justify-content-between align-items-center"
                            th:each="post : ${myPosts}"
                            style="padding: 0.75rem 1.25rem; transition: background 0.15s;">
                            <a th:href="@{/board/{id}(id=${post.id})}"
                               th:text="${post.title}"
                               class="post-title-link text-truncate"
                               style="max-width: 70%;"></a>
                            <span class="text-muted"
                                  style="font-size:0.8rem; flex-shrink:0;"
                                  th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd')}"></span>
                        </li>
                    </ul>

                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* 이니셜 아바타 생성 */
(function() {
    const el = document.getElementById('userAvatar');
    if (!el) return;
    // 닉네임 첫 글자를 아바타에 표시
    const nickname = document.querySelector('.user-avatar + h6');
    if (nickname) {
        el.textContent = nickname.textContent.trim().charAt(0).toUpperCase();
    }
})();

/* 알림 자동 닫기 */
document.querySelectorAll('.alert-auto-close').forEach(el => {
    setTimeout(() => el.remove(), 4000);
});
</script>
</body>
</html>
