name: CD - 자동 배포

# main 브랜치에 push(머지)될 때 실행
on:
  push:
    branches: [ main ]

env:
  # Secret 공백 제거를 위해 전체 job에서 env로 관리
  DEPLOY_HOST: ${{ secrets.LIGHTSAIL_HOST }}
  DEPLOY_USER: ${{ secrets.LIGHTSAIL_USER }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Java 21 (Corretto) 설치
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      # 3. 빌드 + 테스트
      - name: 빌드 및 테스트
        run: mvn clean package --batch-mode

      # 4. SSH 키 설정
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh

          # Base64 디코딩으로 PEM 키 복원 (줄바꿈 문제 방지)
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" | base64 -d > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

          # HOST 공백 제거 후 known_hosts 등록
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # SSH 설정: 연결 실패 시 재시도, 키 인증만 사용
          cat >> ~/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 60
          EOF

      # 5. JAR 파일 서버 전송
      - name: JAR 파일 서버 전송
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          USER=$(echo "$DEPLOY_USER" | tr -d '[:space:]')

          echo "접속 대상: ${USER}@${HOST}"

          ssh -i ~/.ssh/lightsail.pem ${USER}@${HOST} "mkdir -p /home/ubuntu/app"

          scp -i ~/.ssh/lightsail.pem \
              target/board-project-0.0.1-SNAPSHOT.jar \
              ${USER}@${HOST}:/home/ubuntu/app/app.jar

      # 6. 서버에서 앱 재시작
      - name: 서버 앱 재시작
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          USER=$(echo "$DEPLOY_USER" | tr -d '[:space:]')

          ssh -i ~/.ssh/lightsail.pem ${USER}@${HOST} bash << 'ENDSSH'
            pkill -f "java -jar" 2>/dev/null || true
            # 이전 프로세스가 완전히 종료될 때까지 최대 30초 대기
            for i in $(seq 1 30); do
              if ! pgrep -f "java -jar" > /dev/null 2>&1; then
                echo "이전 프로세스 종료 확인 (${i}초)"
                break
              fi
              sleep 1
            done
            nohup java -jar /home/ubuntu/app/app.jar \
              --spring.profiles.active=prod \
              > /home/ubuntu/app/app.log 2>&1 &
            echo "PID: $!"
            echo "배포 완료"
          ENDSSH

      # 7. 헬스체크 (최대 90초, 10초 간격 재시도)
      - name: 헬스체크
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          echo "서버 기동 대기 중..."
          for i in $(seq 1 9); do
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                     "http://${HOST}:8080/board" || echo "000")
            echo "시도 ${i}/9 - HTTP 상태: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "배포 성공"
              exit 0
            fi
          done
          echo "헬스체크 실패 - 서버가 90초 내에 응답하지 않음"
          exit 1
