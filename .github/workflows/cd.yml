name: CD - 자동 배포

# main 브랜치에 push(머지)될 때 실행
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Java 21 (Corretto) 설치
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      # 3. 빌드 + 테스트
      - name: 빌드 및 테스트
        run: mvn clean package --batch-mode

      # 4. SSH 키 설정 (Base64 디코딩 → 줄바꿈 문제 완전 해결)
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" | base64 -d > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      # 5. JAR 파일 서버 전송
      - name: JAR 파일 서버 전송
        run: |
          ssh -i ~/.ssh/lightsail.pem \
              ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
              "mkdir -p /home/ubuntu/app"

          scp -i ~/.ssh/lightsail.pem \
              target/board-project-0.0.1-SNAPSHOT.jar \
              ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/app/app.jar

      # 6. 서버에서 앱 재시작
      - name: 서버 앱 재시작
        run: |
          ssh -i ~/.ssh/lightsail.pem \
              ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
              "pkill -f 'java -jar' 2>/dev/null || true; sleep 3; \
               nohup java -jar /home/ubuntu/app/app.jar \
                 --spring.profiles.active=prod \
                 > /home/ubuntu/app/app.log 2>&1 & echo PID:\$!"

      # 7. 헬스체크 (30초 후 서버 응답 확인)
      - name: 헬스체크
        run: |
          echo "30초 후 서버 상태 확인..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                   http://${{ secrets.LIGHTSAIL_HOST }}:8080/board || echo "000")
          echo "HTTP 상태: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "헬스체크 실패 (상태: $STATUS)"
            exit 1
          fi
          echo "배포 성공!"
