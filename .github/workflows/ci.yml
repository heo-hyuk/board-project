name: CI - 빌드 및 테스트

# PR이 main 브랜치로 올라올 때 실행
on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Java 21 (Corretto) 설치
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven   # ~/.m2 캐싱으로 빌드 속도 향상

      # 3. 전체 테스트 실행 (H2 인메모리 DB 사용 - MariaDB 불필요)
      - name: 테스트 실행
        run: mvn test --batch-mode

      # 4. 테스트 결과 아티팩트 저장 (실패 시에도 확인 가능)
      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7
